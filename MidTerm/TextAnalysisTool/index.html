<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analysis Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Text Analysis Tool</h1>
        
        <textarea id="inputText" placeholder="Paste your paragraph here..."></textarea>
        <br>
        <button id="analyzeBtn">Analyze Text</button>

        <!-- Display results -->
        <div id="results" class="results-div" style="display: none;">
            <p><strong>Total characters:</strong> <span id="charCount">0</span></p>
            <p><strong>Total words:</strong> <span id="wordCount">0</span></p>
            <p><strong>Reversed Text:</strong></p>
            <p id="reversedText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
