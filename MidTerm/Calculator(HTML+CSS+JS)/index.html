<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-container">
        <input type="text" id="result" readonly>

        <div class="buttons">
            <button class="action-btn" onclick="clearResult()">C</button>
            <button class="action-btn" onclick="deleteChar()">DEL</button>
            <button class="op-btn" onclick="appendChar('/')">/</button>
            <button class="op-btn" onclick="appendChar('*')">*</button>

            <button class="num-btn" onclick="appendChar('7')">7</button>
            <button class="num-btn" onclick="appendChar('8')">8</button>
            <button class="num-btn" onclick="appendChar('9')">9</button>
            <button class="op-btn" onclick="appendChar('-')">-</button>

            <button class="num-btn" onclick="appendChar('4')">4</button>
            <button class="num-btn" onclick="appendChar('5')">5</button>
            <button class="num-btn" onclick="appendChar('6')">6</button>
            <button class="op-btn" onclick="appendChar('+')">+</button>

            <button class="num-btn" onclick="appendChar('1')">1</button>
            <button class="num-btn" onclick="appendChar('2')">2</button>
            <button class="num-btn" onclick="appendChar('3')">3</button>
            <button class="eq-btn" onclick="calculateResult()">=</button>

            <button class="num-btn zero" onclick="appendChar('0')">0</button>
            <button class="num-btn" onclick="appendChar('.')">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
